name: Aggiorna Bandi Ogni Notte

on:
  schedule:
      - cron: '0 2 * * *'
        workflow_dispatch:

        jobs:
          fetch-bandi:
              runs-on: ubuntu-latest

                  steps:
                        - name: Scarica il codice della repo
                                uses: actions/checkout@v4

                                      - name: Installa Node.js
                                              uses: actions/setup-node@v4
                                                      with:
                                                                node-version: '20'

                                                                      - name: Installa le librerie necessarie
                                                                              run: npm install node-fetch csv-parse @supabase/supabase-js

                                                                                    - name: Esegui lo script di aggiornamento bandi
                                                                                            run: node scripts/fetch-bandi.js
                                                                                                    env:
                                                                                                              SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                                                                                                                        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
